<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png"
         class="logo">

    <h1>🏥 Hospital Appointment Booking System</h1>

    <form id="appointmentForm">

        <input type="text" id="name"
               placeholder="Enter Patient Name" required>

        <input type="number" id="age"
               placeholder="Enter Age" required>

        <select id="doctor">
            <option>Dr. Kumar - General</option>
            <option>Dr. Priya - Cardiologist</option>
            <option>Dr. Arun - Neurologist</option>
        </select>

        <input type="date" id="date" required>

        <button type="submit">
            Book Appointment
        </button>

    </form>

    <h2>Booked Appointments</h2>

    <ul id="appointmentList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
